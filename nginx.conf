server {
    listen 8080;
    server_name localhost;

    # Root directory where the files are located
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Ensure browser-side modules (.tsx) are served as javascript
    types {
        application/javascript  js ts tsx;
        text/html               html htm shtml;
        text/css                css;
    }

    location / {
        # Handle SPA routing: check for file, then directory, then fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache control for assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
